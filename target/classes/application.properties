spring.application.name=concessionaria-backend
debug=false
server.port=${PORT:${SERVER_PORT:8080}}
logging.level.root=INFO
logging.level.org.springframework=INFO

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:concessionaria}?sslMode=REQUIRED&allowPublicKeyRetrieval=true&serverTimezone=America/Fortaleza
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jackson.time-zone=America/Fortaleza
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.jwt.secret=${JWT_SECRET:troque-este-segredo-em-producao-para-uma-chave-grande}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.upload-dir=${UPLOAD_DIR:uploads/carros}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8081}
